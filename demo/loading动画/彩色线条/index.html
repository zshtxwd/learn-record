<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            background-color: #000;
        }

        .page {
            display: flex;
            justify-content: center;
            margin-top: 300px;
        }

        .container {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .ring {
            width: 190px;
            height: 190px;
            border: 1px solid transparent;
            position: absolute;
            border-radius: 50%;

        }

        .h3 {
            color: #fff;
        }

        .ring:nth-child(1) {
            border-bottom: 8px solid red;
            animation: rotate1 2s linear infinite;
        }

        @keyframes rotate1 {
            from {
                transform: rotateX(50deg) rotateZ(110deg);
            }

            to {
                transform: rotateX(50deg) rotateZ(470deg);
            }
        }

        .ring:nth-child(2) {
            border-bottom: 8px solid blue;
            animation: rotate2 2s linear infinite;
        }

        @keyframes rotate2 {
            from {
                transform: rotateX(40deg) rotateY(130deg) rotateZ(450deg);
            }

            to {
                transform: rotateX(40deg) rotateY(130deg) rotateZ(90deg);
            }
        }

        .ring:nth-child(3) {
            border-bottom: 8px solid yellow;
            animation: rotate3 2s linear infinite;
        }

        @keyframes rotate3 {
            from {
                transform: rotateX(40deg) rotateY(220deg) rotateZ(360deg);
            }

            to {
                transform: rotateX(40deg) rotateY(220deg) rotateZ(0deg);
            }
        }

        .ring:nth-child(4) {
            border-bottom: 8px solid green;
            animation: rotate4 2s linear infinite;
        }

        @keyframes rotate4 {
            from {
                transform: rotateX(70deg) rotateZ(180deg);
            }

            to {
                transform: rotateX(70deg) rotateZ(540deg);
            }
        }
    </style>
</head>

<body>
    <div class="page">
        <div class="container">
            <div class="ring"></div>
            <div class="ring"></div>
            <div class="ring"></div>
            <div class="ring"></div>
            <div class="h3">loading...</div>
        </div>
    </div>
</body>

</html>
